# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
unbind = $mainMod, RETURN
bindd = $mainMod, RETURN, ZSH, exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)" -e zsh
bind = $mainMod, BACKSPACE,exec, $terminal --working-directory="$(omarchy-cmd-terminal-cwd)" -e zsh

bind = $mainMod Alt, Return, exec, $terminal --class float_kitty 
bind = $mainMod, W, killactive, # Cerramos alguna ventana (activa)


bind = $mainMod, E, exec, $fileManager # Ejecutamos el filemanager

bind = $mainMod, Space, exec, $menu # Lanzar menu
bind = $mainMod SHIFT, W, exec, waypaper # Lanzar menu de fondo de pantalla

unbind = $mainMod SHIFT, RETURN,
bind = $mainMod SHIFT, RETURN, exec ,$BROWSER
bind = $mainMod SHIFT, BACKSPACE,exec, $BROWSER

# Move focus with mainMod + arrow keys
unbind = $mainMod, J
bind = $mainMod, J, movefocus, d
unbind = $mainMod, L
bind = $mainMod, L, movefocus, r
unbind = $mainMod, H
bind = $mainMod, H, movefocus, l
unbind = $mainMod, K
bind = $mainMod, K, movefocus, u
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Resize windows with mainMod + Ctrl + HJKL (vim motion)
unbind = $mainMod CTRL, H
unbind = $mainMod CTRL, L
unbind = $mainMod CTRL, J
unbind = $mainMod CTRL, K
bind = $mainMod CTRL, H, resizeactive, -10% 0
bind = $mainMod CTRL, L, resizeactive, 10% 0
bind = $mainMod CTRL, J, resizeactive, 0 -10%
bind = $mainMod CTRL, K, resizeactive, 0 10%

# Resize windows with mainMod + Ctrl + arrows
unbind = $mainMod CTRL, left
unbind = $mainMod CTRL, right
unbind = $mainMod CTRL, up
unbind = $mainMod CTRL, down
bind = $mainMod CTRL, left, resizeactive, -10% 0
bind = $mainMod CTRL, right, resizeactive, 10% 0
bind = $mainMod CTRL, up, resizeactive, 0 10%
bind = $mainMod CTRL, down, resizeactive, 0 -10%

# Swap windows with mainMod + Shift + HJKL (vim motion)
unbind = $mainMod SHIFT, H
unbind = $mainMod SHIFT, L
unbind = $mainMod SHIFT, J
unbind = $mainMod SHIFT, K
bind = $mainMod SHIFT, H, swapwindow, l
bind = $mainMod SHIFT, L, swapwindow, r
bind = $mainMod SHIFT, J, swapwindow, d
bind = $mainMod SHIFT, K, swapwindow, u

# Swap windows with mainMod + Shift + arrows
unbind = $mainMod SHIFT, left
unbind = $mainMod SHIFT, right
unbind = $mainMod SHIFT, up
unbind = $mainMod SHIFT, down
bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, down, swapwindow, d
bind = $mainMod SHIFT, up, swapwindow, u

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Switch to previous/next workspace with mainMod + Alt + H/L
unbind = $mainMod ALT, H
unbind = $mainMod ALT, L
bind = $mainMod ALT, H, workspace, e-1
bind = $mainMod ALT, L, workspace, e+1

# Switch to previous/next workspace with mainMod + Alt + arrows
unbind = $mainMod ALT, left
unbind = $mainMod ALT, right
bind = $mainMod ALT, left, workspace, e-1
bind = $mainMod ALT, right, workspace, e+1

### Defaults Omarchy Bindings
# TAB between workspaces
bindd = $mainMod, TAB, Next workspace, workspace, e+1
bindd = $mainMod SHIFT, TAB, Previous workspace, workspace, e-1
bindd = $mainMod CTRL, TAB, Former workspace, workspace, previous

# Move workspaces to other monitors
bindd = $mainMod CTRL ALT, LEFT, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = $mainMod CTRL ALT, RIGHT, Move workspace to right monitor, movecurrentworkspacetomonitor, r
bindd = $mainMod CTRL ALT, UP, Move workspace to up monitor, movecurrentworkspacetomonitor, u
bindd = $mainMod CTRL ALT, DOWN, Move workspace to down monitor, movecurrentworkspacetomonitor, d

# Control tiling
# bindd = $mainMod, J, Toggle window split, layoutmsg, togglesplit
# bindd = $mainMod, P, Pseudo window, pseudo, # dwindle
bindd = $mainMod, T, Toggle window floating/tiling, togglefloating,
bindd = $mainMod, F, Full screen, fullscreen, 0
bindd = $mainMod CTRL, F, Tiled full screen, fullscreenstate, 0 2
bindd = $mainMod ALT, F, Full width, fullscreen, 1
bindd = $mainMod, O, Pop window out (float & pin), exec, omarchy-hyprland-window-pop
# bindd = $mainMod, L, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle

# Toggle between Scroll and Dwindle layout
unbind = $mainMod ALT SHIFT CTRL, M
bind = $mainMod ALT SHIFT CTRL, M, exec, omarchy-hyprland-workspace-layout-toggle

# Close windows
bindd = $mainMod, W, Close window, killactive,
bindd = CTRL ALT, DELETE, Close all windows, exec, omarchy-hyprland-window-close-all

# Copy / Paste
bindd = $mainMod, C, Universal copy, sendshortcut, CTRL, Insert,
bindd = $mainMod, V, Universal paste, sendshortcut, SHIFT, Insert,
bindd = $mainMod, X, Universal cut, sendshortcut, CTRL, X,
bindd = $mainMod CTRL, V, Clipboard manager, exec, omarchy-launch-walker -m clipboard
## Menus
bindd = $mainMod, SPACE, Launch apps, exec, omarchy-launch-walker
bindd = $mainMod CTRL, E, Emoji picker, exec, omarchy-launch-walker -m symbols
bindd = $mainMod CTRL, C, Capture menu, exec, omarchy-menu capture
bindd = $mainMod CTRL, O, Toggle menu, exec, omarchy-menu toggle
bindd = $mainMod CTRL, H, Hardware menu, exec, omarchy-menu hardware
bindd = $mainMod ALT, SPACE, Omarchy menu, exec, omarchy-menu
bindd = $mainMod SHIFT, code:201, Omarchy menu, exec, omarchy-menu
bindd = $mainMod, ESCAPE, System menu, exec, omarchy-menu system
bindld = , XF86PowerOff, Power menu, exec, omarchy-menu system
bindd = $mainMod, ?, Show key bindings, exec, omarchy-menu-keybindings
bindd = , XF86Calculator, Calculator, exec, gnome-calculator

# Aesthetics
bindd = $mainMod SHIFT, SPACE, Toggle top bar, exec, omarchy-toggle-waybar
bindd = $mainMod CTRL, SPACE, Theme background menu, exec, omarchy-menu background
bindd = $mainMod SHIFT CTRL, SPACE, Theme menu, exec, omarchy-menu theme
# bindd = $mainMod, BACKSPACE, Toggle window transparency, exec, omarchy-hyprland-active-window-transparency-toggle
# bindd = $mainMod SHIFT, BACKSPACE, Toggle window gaps, exec, omarchy-hyprland-window-gaps-toggle
# bindd = $mainMod CTRL, BACKSPACE, Toggle single-window square aspect, exec, omarchy-hyprland-window-single-square-aspect-toggle

# Notifications
bindd = $mainMod, COMMA, Dismiss last notification, exec, makoctl dismiss
bindd = $mainMod SHIFT, COMMA, Dismiss all notifications, exec, makoctl dismiss --all
bindd = $mainMod CTRL, COMMA, Toggle silencing notifications, exec, omarchy-toggle-notification-silencing
bindd = $mainMod ALT, COMMA, Invoke last notification, exec, makoctl invoke
bindd = $mainMod SHIFT ALT, COMMA, Restore last notification, exec, makoctl restore

# Toggles
bindd = $mainMod CTRL, I, Toggle locking on idle, exec, omarchy-toggle-idle
bindd = $mainMod CTRL, N, Toggle nightlight, exec, omarchy-toggle-nightlight
bindd = $mainMod CTRL, Delete, Toggle laptop display, exec, omarchy-hyprland-monitor-internal toggle
bindd = $mainMod CTRL ALT, Delete, Toggle laptop display mirroring, exec, omarchy-hyprland-monitor-internal-mirror toggle
bindl = , switch:on:Lid Switch, exec, omarchy-hw-external-monitors && omarchy-hyprland-monitor-internal off
bindl = , switch:off:Lid Switch, exec, omarchy-hyprland-monitor-internal on

# Captures
bindd = , PRINT, Screenshot, exec, omarchy-capture-screenshot
bindd = ALT, PRINT, Screenrecording, exec, omarchy-menu screenrecord
bindd = $mainMod, PRINT, Color picker, exec, pkill hyprpicker || hyprpicker -a
bindd = $mainMod CTRL, PRINT, Extract text (OCR) from screenshot, exec, omarchy-capture-text-extraction

# File sharing
bindd = $mainMod CTRL, S, Share, exec, omarchy-menu share

# Waybar-less information
bindd = $mainMod CTRL ALT, T, Show time, exec, notify-send -u low "    $(date +"%A %H:%M  ·  %d %B %Y  ·  Week %V")"
bindd = $mainMod CTRL ALT, B, Show battery remaining, exec, notify-send -u low "$(omarchy-battery-status)"

# Control panels
bindd = $mainMod CTRL, A, Audio controls, exec, omarchy-launch-audio
bindd = $mainMod CTRL, B, Bluetooth controls, exec, omarchy-launch-bluetooth
bindd = $mainMod CTRL, W, Wifi controls, exec, omarchy-launch-wifi
bindd = $mainMod CTRL, T, Activity, exec, omarchy-launch-tui btop

# Dictation
bindd = $mainMod CTRL, X, Toggle dictation, exec, voxtype record toggle

bindd  = , F9, Start dictation (push-to-talk), exec, voxtype record start
binddr = , F9, Stop dictation (push-to-talk),  exec, voxtype record stop

# Zoom
bindd = $mainMod CTRL, Z, Zoom in, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 1')
bindd = $mainMod CTRL ALT, Z, Reset zoom, exec, hyprctl keyword cursor:zoom_factor 1

# Lock system
bindd = $mainMod CTRL, L, Lock system, exec, omarchy-system-lock
# Toggle groups
bindd = $mainMod, G, Toggle window grouping, togglegroup
bindd = $mainMod ALT, G, Move active window out of group, moveoutofgroup

# Join groups
bindd = $mainMod ALT, LEFT, Move window to group on left, moveintogroup, l
bindd = $mainMod ALT, RIGHT, Move window to group on right, moveintogroup, r
bindd = $mainMod ALT, UP, Move window to group on top, moveintogroup, u
bindd = $mainMod ALT, DOWN, Move window to group on bottom, moveintogroup, d

# Navigate a single set of grouped windows
bindd = $mainMod ALT, TAB, Next window in group, changegroupactive, f
bindd = $mainMod ALT SHIFT, TAB, Previous window in group, changegroupactive, b

# Window navigation for grouped windows
bindd = $mainMod CTRL, LEFT, Move grouped window focus left, changegroupactive, b
bindd = $mainMod CTRL, RIGHT, Move grouped window focus right, changegroupactive, f

# Scroll through a set of grouped windows with $mainMod + ALT + scroll
bindd = $mainMod ALT, mouse_down, Next window in group, changegroupactive, f
bindd = $mainMod ALT, mouse_up, Previous window in group, changegroupactive, b

# Activate window in a group by number
bindd = $mainMod ALT, code:10, Switch to group window 1, changegroupactive, 1
bindd = $mainMod ALT, code:11, Switch to group window 2, changegroupactive, 2
bindd = $mainMod ALT, code:12, Switch to group window 3, changegroupactive, 3
bindd = $mainMod ALT, code:13, Switch to group window 4, changegroupactive, 4
bindd = $mainMod ALT, code:14, Switch to group window 5, changegroupactive, 5

